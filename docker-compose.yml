services:
  minecraft-paper:
    build: .
    # image: itzg/minecraft-server
    container_name: minecraft-paper
    ports:
      - "25565:25565"
    environment:
      EULA: "TRUE"           # Must be TRUE to run the server
      TYPE: "PAPER"          # Use PaperMC server type
      VERSION: "1.21.8"      # Minecraft version (change as needed)
      MEMORY: "4G"           # RAM for the server (e.g., 2G, 4G)
      VIEW_DISTANCE: "16"    # Minecraft view distance
      # PAPER_BUILD: "140"   # Optional: specific Paper build
      # PAPER_CHANNEL: "experimental" # Optional: for experimental builds
      SERVER_NAME: "Miami" # Optional: server name
      DIFFICULTY: "hard"   # Optional: game difficulty
      # MAX_PLAYERS: "10"    # Optional: max players
      ONLINE_MODE: "FALSE"  # Optional: enable/disable authentication
    volumes:
      - ./data:/data         # Persists world and config files
    # restart: unless-stopped
    tty: true
    stdin_open: true
