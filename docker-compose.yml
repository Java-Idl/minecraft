services:
  minecraft-paper:
    image: itzg/minecraft-server
    container_name: minecraft-paper
    ports:
      - "25575:25575"
    environment:
      EULA: "TRUE"
      TYPE: "PAPER"
      VERSION: "1.21.11"
      MEMORY: "4G"
      VIEW_DISTANCE: "16"
      SERVER_NAME: "Miami"
      DIFFICULTY: "hard"
      ONLINE_MODE: "FALSE"
      SKIP_DOWNLOAD: "TRUE"
      SERVER_PORT: "25575"
      ENABLE_RCON: "FALSE"
    volumes:
      - ./minecraft_data:/data
    restart: unless-stopped
    tty: true
    stdin_open: true

  websockify:
    image: jwnmulder/websockify:latest
    container_name: minecraft-websockify
    # Listens on 8080 and forwards to the Minecraft container's internal port
    command: 8080 minecraft-paper:25575
    restart: unless-stopped
    depends_on:
      - minecraft-paper

  nginx:
    image: nginx:latest
    container_name: minecraft-nginx
    ports:
      # Standard HTTP port exposed for the Websocket tunnel
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    restart: unless-stopped
    depends_on:
      - websockify